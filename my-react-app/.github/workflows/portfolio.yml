name: Linters

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_COLOR: 1

jobs:
  nodechecker:
    name: node_modules checker
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check node_modules existence
        run: |
          if [ -d "node_modules/" ]; then
            echo -e "\e[1;31mThe node_modules/ folder was pushed to the repo. Please remove it from the GitHub repository and try again.";
            echo -e "\e[1;32mYou can set up a .gitignore file with this folder included on it to prevent this from happening in the future.";
            exit 1;
          fi

  lint-build-test:
    name: lint, build and test
    runs-on: ubuntu-24.04
    needs: nodechecker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build project
        run: npm run build
      - name: Run tests
        run: npm test -- --passWithNoTests
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    needs: lint-build-test
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
